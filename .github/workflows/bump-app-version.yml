name: Bump App Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: bump-app-version-main
  cancel-in-progress: true

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version bump]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Bump package version
        id: version
        shell: bash
        run: |
          output="$(node scripts/bump-minor-version.mjs)"
          echo "$output"
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done <<< "$output"

      - name: Commit bumped version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: bump app version to ${{ steps.version.outputs.display }} [skip version bump]"
          git push
