services:
  postgres:
    image: postgres:16-alpine
    container_name: pandadoc-qbo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pandadoc_qbo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres-data:
